<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Removed the referrer meta tag as it was causing aggressive blocking from the image hosts -->
    <title>Valentine Test</title>
    <style>
        /* === GENERAL STYLES === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; /* Prevent text selection on mobile devices */
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #ffb6c1; /* Base pink color */
            transition: background-color 1s ease;
        }

        /* Canvas for the clouds/brush effect */
        #cloud-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Let clicks pass through to elements below */
        }

        /* === UI CONTAINER === */
        #ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 10vh; /* Space from top */
            height: 100%;
            text-align: center;
            pointer-events: auto;
        }

        /* === TEXT STYLES === */
        h1, h2 {
            /* Red diamond color with gold border */
            color: #d10024;
            -webkit-text-stroke: 1.5px #ffd700;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            padding: 0 20px;
            max-width: 90%;
            transition: opacity 0.5s ease;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            margin-bottom: 20px;
        }

        h2 {
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            margin-top: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        h2.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* === GIF IMAGE CONTAINER === */
        .gif-container {
            height: 250px; /* Fixed height so the layout doesn't jump while loading */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        #main-gif {
            width: 90%;
            max-width: 250px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.3);
            object-fit: cover;
        }

        /* === BUTTONS === */
        #button-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap; /* Allows wrapping if button gets too huge */
            gap: 20px; /* Space between buttons - prevents overlapping */
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            min-height: 100px;
            padding: 0 20px;
        }

        button {
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            /* Transition padding and font-size instead of scale to prevent overlapping */
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            white-space: nowrap;
        }

        button:active {
            transform: scale(0.95); /* Little click bump effect */
        }

        #btn-yes {
            background-color: #28a745;
            font-size: 1.5rem;
            padding: 20px 40px;
        }

        #btn-no {
            background-color: #dc3545;
            font-size: 1.5rem;
            padding: 20px 40px;
            position: relative; /* Will change to fixed later */
        }

        /* === STORM STATE (NEGATIVE EASTER EGG) === */
        body.storm-mode {
            background-color: #1a2a3a;
        }
        
        .storm-mode h1 {
            color: #0f52ba; /* Sapphire blue */
            -webkit-text-stroke: 1.5px #ffd700; /* Gold border */
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.8);
        }

    </style>
</head>
<body>

    <!-- Canvas for brush/clouds effect -->
    <canvas id="cloud-canvas"></canvas>

    <!-- Main UI Container -->
    <div id="ui-container">
        <h1 id="main-text">Loading...</h1>
        
        <!-- GIF Container to prevent layout jumps -->
        <div class="gif-container">
            <img id="main-gif" src="intro.gif" alt="Cute Valentine GIF">
        </div>
        
        <div id="button-container">
            <button id="btn-yes">Yes</button>
            <button id="btn-no">No</button>
        </div>

        <h2 id="sub-text">You just made me the happiest person! ❤️</h2>
    </div>

    <script>
        // === GLOBAL VARIABLES & STATE ===
        // Get name from URL (?name=HerName), default is "Honey"
        const urlParams = new URLSearchParams(window.location.search);
        const personName = urlParams.get('name') || 'Honey';
        
        let noClickCount = 0;
        const maxNoClicks = 6; // Starts running away on the 7th interaction
        let isRunawayMode = false;

        // Base sizes for dynamic button resizing (prevents overlapping)
        let yesFontSize = 1.5; // rem
        let yesPaddingV = 20;  // px
        let yesPaddingH = 40;  // px
        let noFontSize = 1.5;  // rem

        // DOM Elements
        const mainText = document.getElementById('main-text');
        const subText = document.getElementById('sub-text');
        const mainGif = document.getElementById('main-gif');
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const buttonContainer = document.getElementById('button-container');

        // Set initial text
        mainText.innerHTML = `${personName} will you be my Valentine? ❤️`;

        // === PHRASES & GIF LISTS ===
        const noPhrases = [
            "Are you sure?", 
            "Really sure?", 
            "Please don't say no", 
            "If you say no, I will be really sad", 
            "You're going to break my heart", 
            "\"Yes\" is the other button", 
            "Never say no (cit.)"
        ];

        // Safe, classic Giphy URLs that do not trigger the "Content not available" error
        const sadGifs = [
            "sad1.gif",
            "sad2.gif", 
            "sad3.gif",
            "sad4.gif", 
            "sad5.gif", 
            "sad6.gif", 
            "sad7.gif" 
        ];

        const happyGif = "goodEnding.gif";
        const stormGif = "badEnding.gif";


        // === "YES" BUTTON LOGIC ===
        btnYes.addEventListener('click', () => {
            mainText.innerHTML = `Knew you would say yes! ❤️`;
            mainGif.src = happyGif;
            
            // Hide buttons
            buttonContainer.style.display = 'none';
            
            // Show bottom text
            subText.classList.add('visible');
        });


        // === "NO" BUTTON LOGIC ===
        const handleNoInteraction = (e) => {
            if (e) e.preventDefault(); // Prevent default touch behavior

            if (isRunawayMode) {
                // If in runaway mode and the user stubbornly manages to click it
                triggerStormEnding();
                return;
            }

            if (noClickCount < maxNoClicks) {
                // Phase 1: Change text, gif, and sizes
                btnNo.innerText = noPhrases[noClickCount];
                mainGif.src = sadGifs[noClickCount % sadGifs.length];
                
                noClickCount++;

                // Increase YES size, decrease NO size (modifying actual properties prevents overlap)
                yesFontSize += 0.6;
                yesPaddingV += 5;
                yesPaddingH += 15;
                
                noFontSize -= 0.12;

                btnYes.style.fontSize = `${yesFontSize}rem`;
                btnYes.style.padding = `${yesPaddingV}px ${yesPaddingH}px`;
                
                btnNo.style.fontSize = `${noFontSize}rem`;

            } else {
                // Phase 2: Start runaway mode!
                isRunawayMode = true;
                
                // Keep YES button at the center by letting flexbox do its job natively
                btnYes.style.margin = "0 auto";
                
                // Detach NO button from layout and let it fly around
                const rect = btnNo.getBoundingClientRect();
                btnNo.style.position = 'fixed';
                btnNo.style.left = `${rect.left}px`;
                btnNo.style.top = `${rect.top}px`;
                btnNo.style.zIndex = '100';
                
                // Force a small delay before running away for the first time
                setTimeout(moveButtonAway, 50);
            }
        };

        btnNo.addEventListener('click', handleNoInteraction);

        // === NO BUTTON RUNAWAY LOGIC ===
        const moveButtonAway = () => {
            if (!isRunawayMode) return;

            const btnWidth = btnNo.offsetWidth;
            const btnHeight = btnNo.offsetHeight;
            
            // Calculate safe boundaries to keep the button on screen
            const maxX = window.innerWidth - btnWidth - 20;
            const maxY = window.innerHeight - btnHeight - 20;

            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));

            btnNo.style.left = `${randomX}px`;
            btnNo.style.top = `${randomY}px`;
        };

        // Use both mouseover and touchstart to make it impossible to click on both PC and Mobile
        btnNo.addEventListener('mouseover', moveButtonAway);
        btnNo.addEventListener('touchstart', (e) => {
            if(isRunawayMode) {
                e.preventDefault();
                moveButtonAway();
            }
        }, {passive: false});


        // === SECRET ENDING (IF THEY MANAGE TO CLICK 'NO' WHILE IT RUNS AWAY) ===
        const triggerStormEnding = () => {
            document.body.classList.add('storm-mode');
            
            // Stop the pink clouds effect, change base colors to storm colors
            baseColor = [26, 42, 58]; // #1a2a3a
            cloudColor = 'rgba(100, 150, 200, 0.1)';

            mainText.innerHTML = `You broke my heart and I'm going to cry 😭`;
            mainGif.src = stormGif;
            
            buttonContainer.style.display = 'none';
            btnNo.style.display = 'none';
        };


        // === CANVAS EFFECT (DYNAMIC CLOUDS / MOUSE BRUSH) ===
        const htmlCanvas = document.getElementById('cloud-canvas');
        const ctx = htmlCanvas.getContext('2d');
        let width, height;

        // Initial Colors
        let baseColor = [255, 182, 193]; // LightPink
        let cloudColor = 'rgba(255, 255, 255, 0.15)'; // Translucent white cloud

        const resizeCanvas = () => {
            width = window.innerWidth;
            height = window.innerHeight;
            htmlCanvas.width = width;
            htmlCanvas.height = height;
            // Initially fill with pink
            ctx.fillStyle = `rgb(${baseColor[0]}, ${baseColor[1]}, ${baseColor[2]})`;
            ctx.fillRect(0, 0, width, height);
        };

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Variables to track mouse/touch
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        const drawCloud = (x, y) => {
            // Create a soft radial gradient
            const radius = 80 + Math.random() * 40; // Variable brush size
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
            gradient.addColorStop(0, cloudColor);
            gradient.addColorStop(1, 'rgba(255,255,255,0)');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        };

        const updatePosition = (e) => {
            if(e.touches) {
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            } else {
                lastX = e.clientX;
                lastY = e.clientY;
            }
        };

        // Desktop Events
        window.addEventListener('mousemove', (e) => {
            updatePosition(e);
            drawCloud(lastX, lastY);
        });

        // Mobile Events
        window.addEventListener('touchmove', (e) => {
            updatePosition(e);
            drawCloud(lastX, lastY);
        }, {passive: true});

        // Animation loop to softly blend the clouds into the background
        const loop = () => {
            // Draw a very transparent rectangle over everything
            // This makes the white clouds slowly absorb into the background
            // creating the dynamic brush effect without destroying performance.
            ctx.fillStyle = `rgba(${baseColor[0]}, ${baseColor[1]}, ${baseColor[2]}, 0.03)`;
            ctx.fillRect(0, 0, width, height);
            
            requestAnimationFrame(loop);
        };
        
        // Start animation
        loop();

    </script>
</body>
</html>
